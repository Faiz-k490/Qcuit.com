[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "qcuit"
version = "0.1.0"
description = "The most beginner-friendly quantum computing library. Write quantum programs in plain English."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Qcuit Team"},
]
keywords = ["quantum", "computing", "qiskit", "beginner", "education"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
    "qiskit>=1.0.0",
    "qiskit-aer>=0.13.0",
]

[project.urls]
Homepage = "https://qcuit.com"
Repository = "https://github.com/qcuit/qcuit"

[tool.setuptools.packages.find]
include = ["qcuit*"]
