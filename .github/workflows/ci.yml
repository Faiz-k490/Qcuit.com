name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  library-tests:
    name: Library tests (qcuit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install qcuit with HEP extras
        run: |
          python -m pip install --upgrade pip
          pip install -e "./library[hep,dev]"
      - name: Run library tests
        run: cd library && PYTHONPATH=. python -m pytest tests -q

  api-tests:
    name: Backend / API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r website/requirements.txt
          pip install -e "./library[hep]"
      - name: Run API tests
        run: cd website && PYTHONPATH=. python -m pytest api/tests -q

  frontend-build:
    name: Frontend production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/frontend/package-lock.json
      - name: Install and build
        run: |
          cd website/frontend
          npm ci
          npm test
          CI=false npm run build
